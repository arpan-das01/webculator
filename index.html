<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCulator</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="project_name">
        <h1>Welocme to WebCulator</h1>
    </div>
    <div class="calculator_body">
        <div class="calculator_display">

        </div>

        <div class="buttons value_7">7</div>
        <div class="buttons value_8">8</div>
        <div class="buttons value_9">9</div>
        <div class="buttons clear">C</div>

        <div class="buttons value_4">4</div>
        <div class="buttons value_5">5</div>
        <div class="buttons value_6">6</div>
        <div class="buttons operator_+">+</div>

        <div class="buttons value_1">1</div>
        <div class="buttons value_2">2</div>
        <div class="buttons value_3">3</div>
        <div class="buttons operator_-">-</div>
        
        <div class="buttons value_0">0</div>
        <div class="buttons operator_*">*</div>
        <div class="buttons operator_/">/</div>
        <div class="buttons operator_=">=</div>

    </div>    
</body>
</html>
